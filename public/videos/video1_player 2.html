<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Player — video1.ascii</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:monospace;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{text-align:center}
#c{display:block;margin:0 auto;max-width:100vw;max-height:90vh;width:auto;height:auto}
.info{margin-top:8px;font-size:12px;color:#888}
.controls{margin-top:8px;display:flex;gap:8px;justify-content:center}
button{background:#e60000;color:#fff;border:none;padding:6px 18px;border-radius:4px;cursor:pointer;font-size:13px}
button:hover{background:#cc0000}
input[type=range]{width:200px}
</style>
</head>
<body>
<div class="container">
  <canvas id="c"></canvas>
  <div class="controls">
    <button id="playBtn">▶ Play</button>
    <input type="range" id="seek" min="0" max="100" value="0">
    <span class="info" id="info">0 / 449</span>
  </div>
  <div class="info" id="fpsInfo">FPS: 15 · 1100×618 · 22569 KB</div>
</div>

<script>
const COLS=1100,ROWS=618,FPS=14.96;
const c=document.getElementById('c');
c.width=COLS;c.height=ROWS;
const ctx=c.getContext('2d');
let f=null,p=false,cu=0,nt=0,an=null,pv=null;

async function ld(u){
  const r=await fetch(u),b=await r.arrayBuffer(),v=new DataView(b);
  let o=0;const fc=v.getUint32(o,1);o+=12;
  const os=[];for(let i=0;i<fc;i++){os.push(Number(v.getBigUint64(o,1)));o+=8;}
  const fr=[];for(let i=0;i<fc;i++){const s=os[i],e=i+1<fc?os[i+1]:b.byteLength;fr.push(new Uint8Array(b,s,e-s));}
  return fr;
}

async function dc(m){
  const t=m[4],p=m.subarray(5);let r;
  if(t===0) r=p.slice();
  else if(t===1){const ds=new DecompressionStream('deflate');const st=new Blob([p]).stream().pipeThrough(ds);r=new Uint8Array(await new Response(st).arrayBuffer());}
  else if(t===2){if(!pv)return null;const ds=new DecompressionStream('deflate');const st=new Blob([p]).stream().pipeThrough(ds);const bd=new Uint8Array(await new Response(st).arrayBuffer());const k=bd.length/7;r=pv.slice();for(let j=0;j<k;j++){const cl=new DataView(bd.buffer,bd.byteOffset).getUint32(j*4,1);for(let c=0;c<3;c++)r[cl*3+c]=bd[7*j+4+c];}}
  else return null;
  pv=r;return r;
}

function re(r){
  if(!r)return;
  const id=ctx.createImageData(COLS,ROWS);
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){const pi=(y*COLS+x)*3,di=(y*COLS+x)*4;id.data[di]=r[pi+2];id.data[di+1]=r[pi+1];id.data[di+2]=r[pi];id.data[di+3]=255;}
  ctx.putImageData(id,0,0);
}

async function pf(){
  if(!f||cu>=f.length){cu=0;return;}
  const r=await dc(f[cu]);re(r);
  document.getElementById('info').textContent=(cu+1)+' / '+f.length;
  document.getElementById('seek').value=(cu/(f.length-1))*100;cu++;
}

function st(){p=false;if(an)cancelAnimationFrame(an);document.getElementById('playBtn').textContent='▶ Play';}
async function tk(ts){if(!p)return;if(ts>=nt||!nt){await pf();nt=ts+(1000/FPS);}an=requestAnimationFrame(tk);}
document.getElementById('playBtn').onclick=async()=>{if(p){st();return;}if(!f){f=await ld('video1.ascii');pv=null;cu=0;}p=true;document.getElementById('playBtn').textContent='⏸ Pause';nt=0;an=requestAnimationFrame(tk);};
document.getElementById('seek').oninput=function(){if(!f)return;cu=Math.floor((parseInt(this.value)/100)*(f.length-1));st();pv=null;pf();};
(async()=>{f=await ld('video1.ascii');pv=null;await pf();})();
</script>
</body>
</html>
