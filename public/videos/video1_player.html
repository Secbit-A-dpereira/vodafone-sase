<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Player — video1.ascii</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:monospace;display:flex;justify-content:center;align-items:center;min-height:100vh}
.container{text-align:center}
#c{display:block;margin:0 auto;max-width:100vw;max-height:90vh;width:100%;height:auto;background:#111;image-rendering:pixelated}
.info{margin-top:8px;font-size:12px;color:#888}
.controls{margin-top:8px;display:flex;gap:8px;justify-content:center;align-items:center}
button{background:#e60000;color:#fff;border:none;padding:6px 18px;border-radius:4px;cursor:pointer;font-size:13px}
button:hover{background:#cc0000}
button:disabled{background:#555;cursor:not-allowed}
input[type=range]{width:200px}
#status{color:#e60000;font-size:12px;margin-top:4px}
</style>
</head>
<body>
<div class="container">
  <canvas id="c"></canvas>
  <div class="controls">
    <button id="playBtn">▶ Play</button>
    <input type="range" id="seek" min="0" max="100" value="0" disabled>
    <span class="info" id="info">—</span>
  </div>
  <div class="info">7.5 FPS · 1080×607 · 24624 KB</div>
  <div id="status"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script>
const SRC_COLS=1080,SRC_ROWS=607,FPS=7.5;
const FILE='video1.ascii';
const c=document.getElementById('c');
const ctx=c.getContext('2d');
const btn=document.getElementById('playBtn');
const seek=document.getElementById('seek');
const info=document.getElementById('info');
const st=document.getElementById('status');
let frames=null,total=0,p=false,cu=0,nt=0,an=null;

function resize(){
  const maxW=Math.min(window.innerWidth-32,1080);
  const w=Math.floor(maxW);
  c.width=w;
  c.height=Math.floor(w*SRC_ROWS/SRC_COLS);
}
resize();
window.addEventListener('resize',resize);

function log(m){st.textContent=m;console.log(m);}

async function loadAll(){
  log('⏳ A carregar '+(25)+' MB...');
  const resp=await fetch(FILE);
  if(!resp.ok)throw new Error('HTTP '+resp.status);
  const raw=new Uint8Array(await resp.arrayBuffer());
  const dv=new DataView(raw.buffer,raw.byteOffset);
  const fc=dv.getUint32(0,1);
  log('📽️ '+fc+' frames');
  total=fc;
  const offs=[];
  for(let i=0;i<fc;i++)offs.push(Number(dv.getBigUint64(12+i*8,1)));
  offs.push(raw.byteLength);
  let pv=null;
  const all=[];
  for(let i=0;i<fc;i++){
    const start=offs[i],end=offs[i+1];
    const m=raw.slice(start,end),tag=m[4],data=m.subarray(5);
    let r=null;
    try{
      if(tag===0) r=data.slice();
      else if(tag===1) r=pako.inflate(data);
      else if(tag===2&&pv){
        const bd=pako.inflate(data);
        const k=bd.length/7;
        const cells=new DataView(bd.buffer,bd.byteOffset);
        r=pv.slice();
        const ix=k*4;
        for(let j=0;j<k;j++){
          const cl=cells.getUint32(j*4,1);
          r[cl*3]=bd[ix+j*3];r[cl*3+1]=bd[ix+j*3+1];r[cl*3+2]=bd[ix+j*3+2];
        }
      }
    }catch(e){}
    if(r) pv=r;
    all.push(r||pv||new Uint8Array(SRC_COLS*SRC_ROWS*3));
  }
  frames=all;
  log('✅ '+fc+' frames descodificados');
  btn.textContent='▶ Play';
  btn.disabled=false;
  info.textContent='1 / '+fc;
  seek.disabled=false;
  f0();
}

function f0(){if(frames&&frames.length)re(frames[0]);}

function re(r){
  if(!r)return;
  const w=c.width,h=c.height;
  const id=ctx.createImageData(w,h);
  for(let y=0;y<h;y++){
    const sy=Math.floor(y*SRC_ROWS/h);
    for(let x=0;x<w;x++){
      const sx=Math.floor(x*SRC_COLS/w);
      const pi=(sy*SRC_COLS+sx)*3,di=(y*w+x)*4;
      id.data[di]=r[pi+2];id.data[di+1]=r[pi+1];id.data[di+2]=r[pi];id.data[di+3]=255;
    }
  }
  ctx.putImageData(id,0,0);
}

function stp(){p=false;if(an)cancelAnimationFrame(an);btn.textContent='▶ Play';}

function tk(ts){
  if(!p||!frames)return;
  if(ts>=nt||!nt){
    if(cu>=total)cu=0;
    re(frames[cu]);cu++;
    info.textContent=cu+' / '+total;
    seek.value=(cu/total)*100;
    nt=ts+(1000/FPS);
  }
  an=requestAnimationFrame(tk);
}

btn.onclick=async ()=>{
  if(p){stp();return;}
  if(btn.disabled)return;
  if(!frames){
    btn.disabled=true;btn.textContent='⏳...';
    try{await loadAll();}catch(e){log('❌ '+e.message);btn.textContent='▶ Tentar novamente';btn.disabled=false;return;}
  }
  p=true;btn.textContent='⏸ Pause';cu=0;nt=0;an=requestAnimationFrame(tk);
};

seek.oninput=function(){
  if(!frames)return;
  stp();
  cu=Math.floor((parseInt(this.value)/100)*(total-1));
  re(frames[cu]);
  info.textContent=(cu+1)+' / '+total;
};

log('▶ Clica em Play');
seek.disabled=true;
btn.disabled=false;
</script>
</body>
</html>
